# golangci-lint config — pragmatic for a POC codebase.
# Focuses on real bugs, not style pedantry.
run:
  timeout: 5m

linters:
  enable:
    - errcheck      # catch ignored errors
    - gosimple      # simplifications
    - govet         # go vet
    - ineffassign   # ineffectual assignments
    - staticcheck   # real bug detector
    - typecheck     # type errors
    - unused        # unused code

linters-settings:
  errcheck:
    # Allow unhandled errors on these idiomatic "best effort" calls.
    exclude-functions:
      - (*database/sql.Tx).Rollback
      - (*github.com/somebox/cards/internal/sqlite.Store).Close
    # Ignore Write/WriteByte on stdout/stderr/ResponseWriter (best-effort I/O).
    check-blank: false
    check-type-assertions: false

issues:
  # Exclude common idiomatic error-ignoring patterns.
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: internal/mcp/mcp\.go
      linters:
        - errcheck
      # MCP stdout writes are best-effort (stdio JSON-RPC).
    - path: internal/httpapi/httpapi\.go
      linters:
        - errcheck
      # ResponseWriter.Write in SSE/idempotency is best-effort.
  max-issues-per-linter: 0
  max-same-issues: 0

{{template "layout" .}}
{{define "content"}}
<section class="ambiguous">
  <h1>Ambiguous short id “{{.Error.Message}}”</h1>
  <p class="muted">{{len .Candidates}} cards share that short id. Pick one:</p>
  <ul class="ambiguous__list">
    {{range .Candidates}}
    <li><a href="/ui/cards/{{.ID}}" title="{{.ID}}">{{shortID .ID}} — {{.Title}}</a></li>
    {{end}}
  </ul>
</section>
{{end}}
